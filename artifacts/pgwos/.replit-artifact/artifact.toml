kind = "web"
previewPath = "/"
title = "PGWOS"
version = "1.0.0"
id = "artifacts/pgwos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25078

[services.development]
run = "pnpm --filter @workspace/pgwos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pgwos", "run", "build" ]
publicDir = "artifacts/pgwos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25078"
BASE_PATH = "/"
