        darkMode:
          type: boolean
        morningReminderEnabled:
          type: boolean
        afternoonReminderEnabled:
          type: boolean
        eveningReminderEnabled:
          type: boolean
        morningReminderTime:
          type: string
        afternoonReminderTime:
          type: string
        eveningReminderTime:
          type: string
        createdAt:
