          format: date-time
      required:
        - id
        - userName
        - darkMode
        - morningReminderEnabled
        - afternoonReminderEnabled
        - eveningReminderEnabled
        - morningReminderTime
        - afternoonReminderTime
        - eveningReminderTime
        - createdAt

    UpdateSettingsBody:
