<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Daily Check-in | PGWOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary": "#00257b",
              "on-secondary-fixed-variant": "#006827",
              "primary-dim": "#3367ff",
              "secondary-container": "#006e2a",
              "surface-dim": "#0e0e0e",
              "surface-container-high": "#20201f",
              "tertiary": "#ffbd5c",
              "outline": "#767575",
              "on-secondary": "#005d22",
              "surface-bright": "#2c2c2c",
              "on-primary-container": "#001b61",
              "on-error": "#490013",
              "on-secondary-container": "#e4ffe1",
              "on-background": "#ffffff",
              "inverse-surface": "#fcf9f8",
              "primary": "#94aaff",
              "primary-fixed": "#809bff",
              "on-tertiary-fixed-variant": "#5b3b00",
              "tertiary-fixed": "#feaa00",
              "tertiary-dim": "#ec9e00",
              "tertiary-container": "#feaa00",
              "on-tertiary-fixed": "#331f00",
              "error": "#ff6e84",
              "on-error-container": "#ffb2b9",
              "secondary-dim": "#4bee74",
              "primary-fixed-dim": "#6c8cff",
              "surface": "#0e0e0e",
              "background": "#0e0e0e",
              "surface-tint": "#94aaff",
              "surface-container": "#1a1a1a",
              "inverse-primary": "#004eea",
              "surface-container-highest": "#262626",
              "on-surface-variant": "#adaaaa",
              "inverse-on-surface": "#565555",
              "on-tertiary": "#5c3b00",
              "secondary-fixed": "#5cfd80",
              "error-container": "#a70138",
              "secondary": "#5cfd80",
              "secondary-fixed-dim": "#4bee74",
              "on-secondary-fixed": "#004819",
              "on-primary-fixed": "#000000",
              "surface-container-low": "#131313",
              "primary-container": "#809bff",
              "outline-variant": "#484847",
              "error-dim": "#d73357",
              "surface-container-lowest": "#000000",
              "tertiary-fixed-dim": "#ec9e00",
              "on-surface": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      body { background-color: #0e0e0e; }
      .glass-card {
        background: rgba(38, 38, 38, 0.6);
        backdrop-filter: blur(20px);
      }
      .liquid-gradient {
        background: linear-gradient(135deg, #94aaff 0%, #809bff 100%);
      }
      .custom-range::-webkit-slider-runnable-track {
        background: #1a1a1a;
        height: 6px;
        border-radius: 999px;
      }
      .custom-range::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 18px;
        width: 18px;
        border-radius: 50%;
        background: #94aaff;
        margin-top: -6px;
        box-shadow: 0 0 10px rgba(148, 170, 255, 0.4);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Anchor -->
<header class="w-full top-0 sticky z-50 bg-[#131313] flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-[#2c2c2c] transition-colors duration-200 active:scale-95 text-white">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-headline font-bold text-white tracking-tight text-xl">Daily Check-in</h1>
</div>
<button class="p-2 rounded-full hover:bg-[#2c2c2c] transition-colors duration-200 active:scale-95 text-[#adaaaa]">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<main class="max-w-2xl mx-auto px-6 py-8 pb-32">
<!-- Introduction Section -->
<section class="mb-12">
<p class="font-label text-xs uppercase tracking-[0.2em] text-primary mb-2">Reflective Moment</p>
<h2 class="font-headline text-4xl font-extralight text-on-surface leading-tight">How are you arriving <br/><span class="font-bold">today?</span></h2>
</section>
<div class="space-y-6">
<!-- Mood Grid (Bento Style) -->
<div class="grid grid-cols-3 gap-4">
<button class="group relative flex flex-col items-center justify-center p-6 rounded-xl bg-surface-container-low hover:bg-surface-container-high transition-all duration-300 border border-outline-variant/5">
<span class="material-symbols-outlined text-4xl text-on-surface-variant group-hover:text-secondary transition-colors" style="font-variation-settings: 'FILL' 0;">sentiment_very_satisfied</span>
<span class="font-label text-[10px] mt-3 uppercase tracking-wider text-on-surface-variant">Happy</span>
</button>
<button class="group relative flex flex-col items-center justify-center p-6 rounded-xl bg-surface-container border border-primary/20 transition-all duration-300">
<span class="material-symbols-outlined text-4xl text-primary transition-colors" style="font-variation-settings: 'FILL' 1;">sentiment_neutral</span>
<span class="font-label text-[10px] mt-3 uppercase tracking-wider text-primary">Neutral</span>
<div class="absolute top-2 right-2 w-1.5 h-1.5 rounded-full bg-primary shadow-[0_0_8px_rgba(148,170,255,0.8)]"></div>
</button>
<button class="group relative flex flex-col items-center justify-center p-6 rounded-xl bg-surface-container-low hover:bg-surface-container-high transition-all duration-300 border border-outline-variant/5">
<span class="material-symbols-outlined text-4xl text-on-surface-variant group-hover:text-error transition-colors" style="font-variation-settings: 'FILL' 0;">sentiment_very_dissatisfied</span>
<span class="font-label text-[10px] mt-3 uppercase tracking-wider text-on-surface-variant">Low</span>
</button>
</div>
<!-- Energy Level Slider Card -->
<div class="p-8 rounded-xl bg-surface-container-low border border-outline-variant/10">
<div class="flex justify-between items-end mb-8">
<div>
<h3 class="font-headline text-lg font-bold text-on-surface">Energy Level</h3>
<p class="text-sm text-on-surface-variant mt-1">How charged is your battery?</p>
</div>
<span class="font-headline text-4xl font-bold text-primary">7</span>
</div>
<input class="w-full appearance-none custom-range cursor-pointer" max="10" min="1" type="range" value="7"/>
<div class="flex justify-between mt-4">
<span class="font-label text-[10px] text-on-surface-variant/50 uppercase">Depleted</span>
<span class="font-label text-[10px] text-on-surface-variant/50 uppercase">Electric</span>
</div>
</div>
<!-- Focus Level Slider Card -->
<div class="p-8 rounded-xl bg-surface-container-low border border-outline-variant/10">
<div class="flex justify-between items-end mb-8">
<div>
<h3 class="font-headline text-lg font-bold text-on-surface">Focus Level</h3>
<p class="text-sm text-on-surface-variant mt-1">Mental clarity and presence.</p>
</div>
<span class="font-headline text-4xl font-bold text-tertiary">5</span>
</div>
<input class="w-full appearance-none custom-range cursor-pointer" max="10" min="1" type="range" value="5"/>
<div class="flex justify-between mt-4">
<span class="font-label text-[10px] text-on-surface-variant/50 uppercase">Scattered</span>
<span class="font-label text-[10px] text-on-surface-variant/50 uppercase">Laser Sharp</span>
</div>
</div>
<!-- Quick Notes Area -->
<div class="space-y-3">
<label class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant ml-1">Quick Reflections</label>
<div class="relative group">
<textarea class="w-full h-32 p-6 rounded-xl bg-surface-container-highest border-none focus:ring-1 focus:ring-primary/40 text-on-surface placeholder:text-on-surface-variant/30 transition-all resize-none" placeholder="What's on your mind? Any specific intention for today..."></textarea>
<div class="absolute bottom-4 right-4 opacity-30">
<span class="material-symbols-outlined text-sm">edit_note</span>
</div>
</div>
</div>
</div>
</main>
<!-- Fixed Action Bar -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-surface/80 backdrop-blur-xl border-t border-outline-variant/10 z-50">
<div class="max-w-2xl mx-auto">
<button class="w-full py-4 px-6 rounded-xl liquid-gradient text-on-primary font-headline font-bold text-lg flex items-center justify-center gap-3 active:scale-[0.98] transition-all shadow-[0_10px_30px_-10px_rgba(148,170,255,0.4)]">
                Complete Check-in
                <span class="material-symbols-outlined">done_all</span>
</button>
<p class="text-center text-[10px] font-label text-on-surface-variant/40 mt-4 uppercase tracking-[0.2em]">Data synced with Zenith OS Cloud</p>
</div>
</div>
<!-- Decorative Gradient Background Element -->
<div class="fixed top-0 right-0 -z-10 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[400px] h-[400px] bg-tertiary/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
