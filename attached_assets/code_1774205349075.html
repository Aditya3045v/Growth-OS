<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .glass-panel {
            background: rgba(38, 38, 38, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .liquid-gradient {
            background: linear-gradient(135deg, #94aaff 0%, #809bff 100%);
        }
        .ghost-border {
            border: 1px solid rgba(72, 72, 71, 0.15);
        }
        .inner-glow {
            box-shadow: inset 0 1px 0 0 rgba(148, 170, 255, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full sticky top-0 z-50 bg-[#0e0e0e]">
<div class="flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="text-[#94aaff] hover:bg-[#1a1a1a] transition-colors duration-200 active:scale-95 p-2 rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold text-xl tracking-tight text-[#ffffff]">New Task</h1>
</div>
<div class="flex items-center">
<span class="font-['Manrope'] font-extrabold text-[#ffffff]">PGWOS</span>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 w-full max-w-2xl mx-auto px-6 pt-8 pb-32">
<div class="space-y-8">
<!-- Motivation Moment (Hero Header) -->
<section class="space-y-2">
<p class="font-label text-[10px] uppercase tracking-[0.15em] text-primary font-semibold">Zenith OS Sanctuary</p>
<h2 class="font-headline text-4xl font-extrabold tracking-tight">Design your <br/><span class="text-primary-fixed">productivity</span>.</h2>
</section>
<!-- Task Title Field -->
<div class="space-y-4">
<label class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant font-bold px-1">Task Title</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-xl py-5 px-6 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary-container transition-all text-lg font-medium" placeholder="Enter task name..." type="text"/>
<div class="absolute bottom-0 left-6 right-6 h-[1px] bg-gradient-to-r from-transparent via-primary/20 to-transparent opacity-0 group-focus-within:opacity-100 transition-opacity"></div>
</div>
</div>
<!-- Bento Grid Section for Details -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Due Date Picker -->
<div class="bg-surface-container-low rounded-2xl p-6 ghost-border flex flex-col justify-between space-y-4">
<div class="flex items-center gap-3">
<div class="p-2 bg-surface-container rounded-lg">
<span class="material-symbols-outlined text-primary">calendar_today</span>
</div>
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Due Date</span>
</div>
<input class="bg-transparent border-none text-on-surface font-headline text-lg focus:ring-0 p-0 w-full" type="datetime-local"/>
</div>
<!-- Priority Segmented Control -->
<div class="bg-surface-container-low rounded-2xl p-6 ghost-border space-y-4">
<div class="flex items-center gap-3">
<div class="p-2 bg-surface-container rounded-lg">
<span class="material-symbols-outlined text-tertiary">priority_high</span>
</div>
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Priority</span>
</div>
<div class="flex bg-surface-container-highest p-1 rounded-xl">
<button class="flex-1 py-2 text-xs font-bold font-label uppercase rounded-lg text-on-surface-variant hover:text-on-surface transition-all">Low</button>
<button class="flex-1 py-2 text-xs font-bold font-label uppercase rounded-lg bg-surface-bright text-on-surface shadow-sm">Medium</button>
<button class="flex-1 py-2 text-xs font-bold font-label uppercase rounded-lg text-on-surface-variant hover:text-on-surface transition-all">High</button>
</div>
</div>
</div>
<!-- Description Field -->
<div class="space-y-4">
<label class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant font-bold px-1">Description</label>
<div class="bg-surface-container-low rounded-2xl p-1 ghost-border">
<textarea class="w-full bg-transparent border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline focus:ring-0 resize-none font-body leading-relaxed" placeholder="What needs to be done? Define the outcome..." rows="5"></textarea>
</div>
</div>
<!-- Action Area / Glassmorphism Footer -->
<div class="pt-8 flex flex-col items-center gap-6">
<button class="w-full liquid-gradient py-5 rounded-[1.5rem] font-headline font-extrabold text-on-primary-fixed text-lg inner-glow active:scale-[0.98] transition-all shadow-[0_20px_40px_-10px_rgba(148,170,255,0.3)]">
                    Create Task
                </button>
<p class="text-on-surface-variant text-[11px] font-label uppercase tracking-widest opacity-60">Stored in Digital Sanctuary Cloud</p>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-[#0e0e0e]/80 backdrop-blur-xl border-t border-[#484847]/15 shadow-[0_-10px_40px_-10px_rgba(0,0,0,0.5)] rounded-t-[1.5rem]">
<a class="flex flex-col items-center justify-center text-[#adaaaa] p-3 hover:text-[#ffffff] transition-all active:scale-90" href="#">
<span class="material-symbols-outlined">home</span>
</a>
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#94aaff] to-[#809bff] text-[#0e0e0e] rounded-2xl p-3 active:scale-90 transition-all cubic-bezier(0.2,0,0,1)" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</a>
<a class="flex flex-col items-center justify-center text-[#adaaaa] p-3 hover:text-[#ffffff] transition-all active:scale-90" href="#">
<span class="material-symbols-outlined">calendar_today</span>
</a>
<a class="flex flex-col items-center justify-center text-[#adaaaa] p-3 hover:text-[#ffffff] transition-all active:scale-90" href="#">
<span class="material-symbols-outlined">person</span>
</a>
</nav>
